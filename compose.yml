      identity-service:
        condition: service_healthy
      crm-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      hrms-service:
        condition: service_healthy
      sales-service:
        condition: service_healthy
      org-service:
        condition: service_healthy
      forms-service:
        condition: service_healthy
      approval-service:
        condition: service_healthy
      recruitment-service:
        condition: service_healthy
      integration-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
      notifications-service:
        condition: service_healthy
    environment:
      SERVER_PORT: "8080"
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
      FRONTEND_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,https://fawnixverse.acstechnologies.co.in,http://54.76.187.129,http://54.76.187.129:5173,https://54.76.187.129,http://108.131.209.156,http://108.131.209.156:5173,https://108.131.209.156
      JWT_SECRET: ${JWT_SECRET:-change-this-local-dev-secret-change-this-local-dev-secret}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health > /dev/null || exit 1"]
