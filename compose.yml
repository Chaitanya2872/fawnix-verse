        condition: service_completed_successfully
      eureka-server:
        condition: service_healthy
      identity-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: "8092"
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-change-this-local-dev-secret-change-this-local-dev-secret}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-fawnix-internal-secret}
      NOTIFICATIONS_DB_URL: jdbc:postgresql://postgres:5432/fawnix_notifications
      NOTIFICATIONS_DB_USERNAME: ${POSTGRES_USER:-postgres}
      NOTIFICATIONS_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_AUTH: ${SMTP_AUTH:-true}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-true}
      NOTIFICATIONS_STREAM_NAME: ${NOTIFICATIONS_STREAM_NAME:-notifications:outbox}
      NOTIFICATIONS_STREAM_GROUP: ${NOTIFICATIONS_STREAM_GROUP:-notifications-service}
      NOTIFICATIONS_STREAM_CONSUMER: ${NOTIFICATIONS_STREAM_CONSUMER:-notifications-1}
      NOTIFICATIONS_MAX_RETRIES: ${NOTIFICATIONS_MAX_RETRIES:-5}
      NOTIFICATIONS_RETRY_BASE_SECONDS: ${NOTIFICATIONS_RETRY_BASE_SECONDS:-30}
      NOTIFICATIONS_ALLOWED_ORIGINS: ${NOTIFICATIONS_ALLOWED_ORIGINS:-http://localhost:5173}
      NOTIFICATIONS_EMAIL_FROM: ${NOTIFICATIONS_EMAIL_FROM:-}
      NOTIFICATIONS_OUTBOX_SCAN_MS: ${NOTIFICATIONS_OUTBOX_SCAN_MS:-10000}
      MANAGEMENT_HEALTH_MAIL_ENABLED: "false"
    ports:
      - "8092:8092"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8092/actuator/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 150s
    networks:
      - fawnix-network

  api-gateway:
    build:
      context: .
      dockerfile: backend/Dockerfile
      provenance: false
      sbom: false
      args:
        MODULE_PATH: platform/api-gateway
    restart: unless-stopped
    depends_on:
      eureka-server:
