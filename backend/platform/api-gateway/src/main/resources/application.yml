spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin Vary, RETAIN_FIRST
      routes:
        - id: identity-admin-auth
          uri: lb://IDENTITY-SERVICE
          predicates:
            - Path=/api/auth/register-admin
        - id: identity-auth
          uri: lb://IDENTITY-SERVICE
          predicates:
            - Path=/api/auth/**
        - id: identity-users
          uri: lb://IDENTITY-SERVICE
          predicates:
            - Path=/api/users/**
        - id: crm-leads
          uri: lb://CRM-SERVICE
          predicates:
            - Path=/api/leads/**
        - id: crm-reports
          uri: lb://CRM-SERVICE
          predicates:
            - Path=/api/reports/**
        - id: crm-integrations
          uri: lb://CRM-SERVICE
          predicates:
            - Path=/api/integrations/**
        - id: org-service
          uri: lb://ORG-SERVICE
          predicates:
            - Path=/api/setup/**,/api/departments/**,/api/org/**
        - id: forms-service
          uri: lb://FORMS-SERVICE
          predicates:
            - Path=/api/recruitment/forms/**
        - id: approval-service
          uri: lb://APPROVAL-SERVICE
          predicates:
            - Path=/api/approval-flows/**,/api/approvals/**
        - id: recruitment-service
          uri: lb://RECRUITMENT-SERVICE
          predicates:
            - Path=/api/recruitment/hiring-requests/**,/api/recruitment/positions/**,/api/recruitment/postings/**,/api/recruitment/intake/**,/api/recruitment/pipeline/**,/api/recruitment/decisions/**,/api/recruitment/analytics/**,/api/recruitment/vacancies/**,/api/candidates/**,/api/interviews/**,/api/offers/**,/api/public/forms/**
        - id: integration-service
          uri: lb://INTEGRATION-SERVICE
          predicates:
            - Path=/api/settings/portal-credentials/**,/api/calendar/**
        - id: analytics-service
          uri: lb://ANALYTICS-SERVICE
          predicates:
            - Path=/api/analytics/**
        - id: notifications-service
          uri: lb://NOTIFICATIONS-SERVICE
          predicates:
            - Path=/api/notifications/**
        - id: inventory
          uri: lb://INVENTORY-SERVICE
          predicates:
            - Path=/api/inventory,/api/inventory/**
          filters:
            - StripPrefix=1
        - id: hrms
          uri: lb://HRMS-SERVICE
          predicates:
            - Path=/api/hrms/**
        - id: sales
          uri: lb://SALES-SERVICE
          predicates:
            - Path=/api/sales/**
        - id: procurement
          uri: lb://PROCUREMENT-SERVICE
          predicates:
            - Path=/api/procurement/**,/api/procurement
          filters:
            - StripPrefix=1

server:
  port: ${SERVER_PORT:8080}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

app:
  cors:
    allowed-origins: ${FRONTEND_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,https://fawnixverse.acstechnologies.co.in,http://54.76.187.129,http://54.76.187.129:5173,https://54.76.187.129,http://108.131.209.156,http://108.131.209.156:5173,https://108.131.209.156}
  security:
    jwt:
      secret: ${JWT_SECRET:change-this-local-dev-secret-change-this-local-dev-secret}
