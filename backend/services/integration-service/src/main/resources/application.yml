spring:
  application:
    name: integration-service
  datasource:
    url: ${INTEGRATION_DB_URL:jdbc:postgresql://localhost:5432/fawnix_integration}
    username: ${INTEGRATION_DB_USERNAME:postgres}
    password: ${INTEGRATION_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8090}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  security:
    jwt:
      issuer: fawnix-verse
      access-token-expiration-minutes: 30
      refresh-token-expiration-days: 14
      secret: ${JWT_SECRET:change-this-local-dev-secret-change-this-local-dev-secret}
    internal-service-secret: ${INTERNAL_SERVICE_SECRET:fawnix-internal-secret}

calendar:
  oauth-success-redirect: ${INTEGRATION_OAUTH_SUCCESS_REDIRECT:http://localhost:5173/settings/calendar-integrations}
  google:
    client-id: ${INTEGRATION_GOOGLE_CLIENT_ID:}
    client-secret: ${INTEGRATION_GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${INTEGRATION_GOOGLE_REDIRECT_URI:http://localhost:8080/api/calendar/oauth/google/callback}
    scopes: ${INTEGRATION_GOOGLE_SCOPES:}
  microsoft:
    client-id: ${INTEGRATION_MICROSOFT_CLIENT_ID:}
    client-secret: ${INTEGRATION_MICROSOFT_CLIENT_SECRET:}
    redirect-uri: ${INTEGRATION_MICROSOFT_REDIRECT_URI:http://localhost:8080/api/calendar/oauth/microsoft/callback}
    scopes: ${INTEGRATION_MICROSOFT_SCOPES:}
