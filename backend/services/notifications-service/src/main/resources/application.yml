spring:
  application:
    name: notifications-service
  datasource:
    url: ${NOTIFICATIONS_DB_URL:jdbc:postgresql://localhost:5432/fawnix_notifications}
    username: ${NOTIFICATIONS_DB_USERNAME:postgres}
    password: ${NOTIFICATIONS_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:true}
          starttls:
            enable: ${SMTP_STARTTLS:true}

server:
  port: ${SERVER_PORT:8092}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  security:
    jwt:
      issuer: fawnix-verse
      access-token-expiration-minutes: 30
      refresh-token-expiration-days: 14
      secret: ${JWT_SECRET:change-this-local-dev-secret-change-this-local-dev-secret}
    internal-service-secret: ${INTERNAL_SERVICE_SECRET:fawnix-internal-secret}

notifications:
  stream:
    name: ${NOTIFICATIONS_STREAM_NAME:notifications:outbox}
    group: ${NOTIFICATIONS_STREAM_GROUP:notifications-service}
    consumer: ${NOTIFICATIONS_STREAM_CONSUMER:${HOSTNAME:notifications-1}}
  retries:
    max-attempts: ${NOTIFICATIONS_MAX_RETRIES:5}
    base-delay-seconds: ${NOTIFICATIONS_RETRY_BASE_SECONDS:30}
  deeplink:
    allowed-origins: ${NOTIFICATIONS_ALLOWED_ORIGINS:http://localhost:5173}
  email:
    from: ${NOTIFICATIONS_EMAIL_FROM:}
  outbox:
    scan-ms: ${NOTIFICATIONS_OUTBOX_SCAN_MS:10000}
