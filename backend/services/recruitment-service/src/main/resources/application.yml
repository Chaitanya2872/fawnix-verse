spring:
  application:
    name: recruitment-service
  datasource:
    url: ${RECRUITMENT_DB_URL:jdbc:postgresql://localhost:5432/fawnix_recruitment}
    username: ${RECRUITMENT_DB_USERNAME:postgres}
    password: ${RECRUITMENT_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: ${RECRUITMENT_MAX_UPLOAD_SIZE:10MB}
      max-request-size: ${RECRUITMENT_MAX_UPLOAD_SIZE:10MB}

server:
  port: ${SERVER_PORT:8089}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  security:
    jwt:
      issuer: fawnix-verse
      access-token-expiration-minutes: 30
      refresh-token-expiration-days: 14
      secret: ${JWT_SECRET:change-this-local-dev-secret-change-this-local-dev-secret}
    internal-service-secret: ${INTERNAL_SERVICE_SECRET:fawnix-internal-secret}

storage:
  s3:
    endpoint: ${RECRUITMENT_S3_ENDPOINT:}
    region: ${RECRUITMENT_S3_REGION:us-east-1}
    bucket: ${RECRUITMENT_S3_BUCKET:hirepath}
    access-key: ${RECRUITMENT_S3_ACCESS_KEY:}
    secret-key: ${RECRUITMENT_S3_SECRET_KEY:}
