spring:
  application:
    name: crm-service
  datasource:
    url: ${CRM_DB_URL:jdbc:postgresql://localhost:5432/fawnix_crm}
    username: ${CRM_DB_USERNAME:postgres}
    password: ${CRM_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: ${CRM_CONTACT_RECORDINGS_MAX_SIZE:25MB}
      max-request-size: ${CRM_CONTACT_RECORDINGS_MAX_SIZE:25MB}

server:
  port: ${SERVER_PORT:8082}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  seed:
    enabled: ${APP_SEED_ENABLED:false}
  integrations:
    meta:
      enabled: ${META_LEADS_ENABLED:false}
      verify-token: ${META_VERIFY_TOKEN:}
      app-secret: ${META_APP_SECRET:}
      access-token: ${META_ACCESS_TOKEN:}
      api-version: ${META_API_VERSION:v19.0}
      default-status: ${META_LEAD_STATUS:NEW}
      default-priority: ${META_LEAD_PRIORITY:MEDIUM}
      default-source: ${META_LEAD_SOURCE:SOCIAL}
      default-tags: ${META_LEAD_TAGS:meta}
  security:
    jwt:
      issuer: fawnix-verse
      access-token-expiration-minutes: 30
      refresh-token-expiration-days: 14
      secret: ${JWT_SECRET:change-this-local-dev-secret-change-this-local-dev-secret}
  identity:
    base-url: ${IDENTITY_SERVICE_URL:http://IDENTITY-SERVICE}
    internal-service-secret: ${INTERNAL_SERVICE_SECRET:fawnix-internal-secret}
  contact-recordings:
    storage-prefix: ${CRM_CONTACT_RECORDINGS_PREFIX:contact-recordings}
    max-file-size-bytes: ${CRM_CONTACT_RECORDINGS_MAX_BYTES:26214400}
  object-storage:
    endpoint: ${CRM_OBJECT_STORAGE_ENDPOINT:http://localhost:9000}
    access-key: ${CRM_OBJECT_STORAGE_ACCESS_KEY:minioadmin}
    secret-key: ${CRM_OBJECT_STORAGE_SECRET_KEY:minioadmin}
    bucket: ${CRM_OBJECT_STORAGE_BUCKET:fawnix-objects}
    secure: ${CRM_OBJECT_STORAGE_SECURE:false}
    auto-create-bucket: ${CRM_OBJECT_STORAGE_AUTO_CREATE_BUCKET:true}
    contact-recordings-prefix: ${CRM_OBJECT_STORAGE_CONTACT_RECORDINGS_PREFIX:contact-recordings}
    attachments-prefix: ${CRM_OBJECT_STORAGE_ATTACHMENTS_PREFIX:attachments}
  speech-to-text:
    enabled: ${CRM_SPEECH_TO_TEXT_ENABLED:false}
    url: ${CRM_SPEECH_TO_TEXT_URL:}
    api-key: ${CRM_SPEECH_TO_TEXT_API_KEY:}
    api-key-header: ${CRM_SPEECH_TO_TEXT_API_KEY_HEADER:Authorization}
    api-key-prefix: ${CRM_SPEECH_TO_TEXT_API_KEY_PREFIX:Bearer}
    model: ${CRM_SPEECH_TO_TEXT_MODEL:}
    file-field-name: ${CRM_SPEECH_TO_TEXT_FILE_FIELD:file}
    timeout-seconds: ${CRM_SPEECH_TO_TEXT_TIMEOUT_SECONDS:120}
