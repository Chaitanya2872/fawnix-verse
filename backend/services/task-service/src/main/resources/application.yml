spring:
  application:
    name: task-service
  datasource:
    url: ${TASK_DB_URL:jdbc:postgresql://localhost:5432/fawnix_tasks}
    username: ${TASK_DB_USERNAME:postgres}
    password: ${TASK_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8094}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  security:
    jwt:
      issuer: fawnix-verse
      access-token-expiration-minutes: 30
      refresh-token-expiration-days: 14
      secret: ${JWT_SECRET:change-this-local-dev-secret-change-this-local-dev-secret}
    internal-service-secret: ${INTERNAL_SERVICE_SECRET:fawnix-internal-secret}
  ai:
    task-import:
      enabled: ${TASK_AI_IMPORT_ENABLED:false}
      api-key: ${OPENAI_API_KEY:}
      model: ${TASK_AI_MODEL:gpt-4o-mini}
      temperature: ${TASK_AI_TEMPERATURE:0.2}
