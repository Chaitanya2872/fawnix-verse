spring:
  application:
    name: verse-backend
  profiles:
    active: local
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/fawnix_verse}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

app:
  seed:
    enabled: ${APP_SEED_ENABLED:false}
  cors:
    allowed-origins:
      - ${FRONTEND_ORIGIN:http://localhost:5173}
      - http://127.0.0.1:5173
      - http://localhost:5173
      - https://fawnixverse.acstechnologies.co.in
      - http://54.76.187.129
      - http://54.76.187.129:5173
      - https://54.76.187.129
  security:
    jwt:
      issuer: fawnix-verse
      access-token-expiration-minutes: 30
      refresh-token-expiration-days: 14
      secret: ${JWT_SECRET:change-this-local-dev-secret-change-this-local-dev-secret}
    dev-admin-email: ${DEV_ADMIN_EMAIL:admin@fawnix.com}
    dev-admin-password: ${DEV_ADMIN_PASSWORD:Admin@123}
