name: 🚀 Deploy To EC2 (Production)

on:
  push:
    branches:
      - master

  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: false
        default: master

permissions:
  contents: read

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      DEPLOY_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch || github.ref_name }}
      EC2_HOST: ${{ vars.EC2_HOST }}
      EC2_USER: ${{ vars.EC2_USER }}
      EC2_PORT: ${{ vars.EC2_SSH_PORT }}
      EC2_DEPLOY_DIR: ${{ vars.EC2_DEPLOY_DIR }}
      REPO_URL: https://github.com/Chaitanya2872/fawnix-verse.git

    steps:
      - name: Validate configuration
        shell: bash
        run: |
          set -e
          test -n "${EC2_HOST}" || { echo "Missing EC2_HOST"; exit 1; }
          test -n "${EC2_USER}" || { echo "Missing EC2_USER"; exit 1; }
          test -n "${EC2_DEPLOY_DIR}" || { echo "Missing EC2_DEPLOY_DIR"; exit 1; }
          test -n "${{ secrets.EC2_PEM_KEY }}" || { echo "Missing EC2_PEM_KEY"; exit 1; }

      - name: Setup SSH
        shell: bash
        run: |
          set -euxo pipefail
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "${{ secrets.EC2_PEM_KEY }}" | tr -d '\r' > "$HOME/.ssh/ec2.pem"
          chmod 600 "$HOME/.ssh/ec2.pem"
          # Best-effort keyscan (can fail if port 22 is blocked). We'll still allow SSH to proceed.
          ssh-keyscan -T 10 -p "${EC2_PORT:-22}" -H "${EC2_HOST}" >> "$HOME/.ssh/known_hosts" || true
          chmod 644 "$HOME/.ssh/known_hosts"

      - name: Deploy Application
        shell: bash
        run: |
          set -euxo pipefail

          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i "$HOME/.ssh/ec2.pem" -p "${EC2_PORT:-22}" "${EC2_USER}@${EC2_HOST}" "sudo bash -s" <<EOF
          set -e

          echo "Starting Deployment as root..."

          mkdir -p "${EC2_DEPLOY_DIR}"
          cd "${EC2_DEPLOY_DIR}"

          echo "Current Directory: \$(pwd)"

          if [ ! -d ".git" ]; then
            echo "Cloning repository..."
            git clone "${REPO_URL}" .
            git checkout "${DEPLOY_BRANCH}"
          else
            echo "Pulling latest code..."
            git fetch origin
            git reset --hard "origin/${DEPLOY_BRANCH}"
          fi

          if [ ! -f PRD/.env ]; then
            echo "Creating .env file..."
            cp PRD/.env.example PRD/.env
          fi

          if ! command -v docker >/dev/null 2>&1; then
            echo "Docker not installed"
            exit 1
          fi

          echo "Running Containers Before Deploy:"
          docker ps || true

          echo "Building & Starting Services..."
          docker compose -f PRD/compose.yml --env-file PRD/.env up -d --build || {
            echo "Docker Compose failed. Showing logs..."
            docker compose -f PRD/compose.yml --env-file PRD/.env logs --tail 200
            exit 1
          }

          echo "Cleaning old images..."
          docker image prune -f || true

          echo "Running Containers After Deploy:"
          docker ps

          echo "Checking services health..."
          sleep 10

          if ! docker ps | grep -q "prd-"; then
            echo "Deployment failed: No containers running!"
            docker compose -f PRD/compose.yml --env-file PRD/.env logs --tail=200
            exit 1
          fi

          echo "Deployment Successful!"
          EOF
